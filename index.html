<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ครัวรีเทิน - เข้าสู่ระบบ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }

        .header {
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
            padding: 30px;
            text-align: center;
            color: #1e3c72;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            background: #f5f5f5;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            font-family: 'Kanit', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
            color: #666;
        }

        .tab.active {
            background: white;
            color: #1e3c72;
            font-weight: 600;
            border-bottom: 3px solid #ffc107;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Kanit', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #1e3c72;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-family: 'Kanit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(30, 60, 114, 0.4);
        }

        .btn-customer {
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
            color: #1e3c72;
        }

        .btn-customer:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 193, 7, 0.4);
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-size: 0.9rem;
            color: #1565c0;
        }

        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .badge-customer { background: #e3f2fd; color: #1565c0; }
        .badge-staff { background: #fff3e0; color: #e65100; }
        .badge-owner { background: #f3e5f5; color: #7b1fa2; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header">
            <div class="logo">🍳</div>
            <h1>ครัวรีเทิน</h1>
            <p>ระบบสั่งอาหารผ่าน QR Code</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('customer')">ลูกค้า</button>
            <button class="tab" onclick="switchTab('staff')">พนักงานครัว</button>
            <button class="tab" onclick="switchTab('owner')">เจ้าของร้าน</button>
        </div>

        <!-- ลูกค้า -->
        <div id="customer" class="tab-content active">
            <div class="info-box">
                ลูกค้าไม่ต้องใช้รหัสผ่าน เลือกหมายเลขโต๊ะเพื่อเริ่มสั่งอาหาร
            </div>
            <form onsubmit="loginCustomer(event)">
                <div class="form-group">
                    <label>หมายเลขโต๊ะ</label>
                    <select id="tableNumber" required>
                        <option value="">เลือกโต๊ะ</option>
                        <!-- สร้างตัวเลือกโต๊ะ 1-10 -->
                        <script>
                            for(let i=1; i<=10; i++) {
                                document.write(`<option value="${i}">โต๊ะ ${i}</option>`);
                            }
                        </script>
                    </select>
                </div>
                <button type="submit" class="btn btn-customer">
                    🍽️ เข้าสู่ระบบ (ลูกค้า)
                </button>
                <span class="role-badge badge-customer">ไม่ต้องใช้รหัสผ่าน</span>
            </form>
        </div>

        <!-- พนักงานครัว -->
        <div id="staff" class="tab-content">
            <div class="error-message" id="staffError"></div>
            <form onsubmit="loginStaff(event)">
                <div class="form-group">
                    <label>ชื่อผู้ใช้</label>
                    <input type="text" id="staffUsername" placeholder="chef" required>
                </div>
                <div class="form-group">
                    <label>รหัสผ่าน</label>
                    <input type="password" id="staffPassword" placeholder="chef123" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    👨‍🍳 เข้าสู่ระบบ (พนักงานครัว)
                </button>
                <span class="role-badge badge-staff">เข้าถึง: staff.html</span>
            </form>
        </div>

        <!-- เจ้าของร้าน -->
        <div id="owner" class="tab-content">
            <div class="error-message" id="ownerError"></div>
            <form onsubmit="loginOwner(event)">
                <div class="form-group">
                    <label>ชื่อผู้ใช้</label>
                    <input type="text" id="ownerUsername" placeholder="owner" required>
                </div>
                <div class="form-group">
                    <label>รหัสผ่าน</label>
                    <input type="password" id="ownerPassword" placeholder="owner123" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    👑 เข้าสู่ระบบ (เจ้าของร้าน)
                </button>
                <span class="role-badge badge-owner">เข้าถึง: owner.html</span>
            </form>
        </div>
    </div>

    <script src="storage.js"></script>
    <script>
        // สลับแท็บ
        function switchTab(role) {
            // ซ่อนทั้งหมด
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // แสดงที่เลือก
            document.getElementById(role).classList.add('active');
            event.target.classList.add('active');
        }

        // ลูกค้าเข้าสู่ระบบ
        function loginCustomer(e) {
            e.preventDefault();
            const table = document.getElementById('tableNumber').value;
            
            if (table) {
                loginAsCustomer(parseInt(table));
                window.location.href = 'customer.html';
            }
        }

        // พนักงานเข้าสู่ระบบ
        function loginStaff(e) {
            e.preventDefault();
            const username = document.getElementById('staffUsername').value;
            const password = document.getElementById('staffPassword').value;
            
            const user = login(username, password);
            
            if (user && user.role === 'staff') {
                window.location.href = 'staff.html';
            } else {
                document.getElementById('staffError').style.display = 'block';
                document.getElementById('staffError').textContent = 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
            }
        }

        // เจ้าของร้านเข้าสู่ระบบ
        function loginOwner(e) {
            e.preventDefault();
            const username = document.getElementById('ownerUsername').value;
            const password = document.getElementById('ownerPassword').value;
            
            const user = login(username, password);
            
            if (user && user.role === 'owner') {
                window.location.href = 'owner.html';
            } else {
                document.getElementById('ownerError').style.display = 'block';
                document.getElementById('ownerError').textContent = 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
            }
        }

        // ตรวจสอบว่ามีการ login อยู่แล้วหรือไม่
        window.onload = function() {
            const user = getCurrentUser();
            if (user) {
                if (user.role === 'customer') {
                    window.location.href = 'customer.html';
                } else if (user.role === 'staff') {
                    window.location.href = 'staff.html';
                } else if (user.role === 'owner') {
                    window.location.href = 'owner.html';
                }
            }
        };
    </script>
</body>
</html>
